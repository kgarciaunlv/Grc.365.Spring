<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>


<style>

@font-face {
    font-family: 'SuperPopstar';
    src: url("Super Popstar.ttf") format("truetype");
}
	
	
	
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(rgba(255,255,255,0.9),rgba(255,255,255,0.9)),
    url("oo.png");
    background-size:cover;
    background-position:center;
}

/* Form Container */

.contact-container{
    max-width:600px;
    margin:60px auto;
    background:white;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}

/* Header */

.form-header{
    background:#ff6fa5;
    color:white;
    text-align:center;
    padding:30px;
    font-family:"SuperPopstar";
    font-size:48px;
}

/* Form body */

form{
    padding:30px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:500;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ddd;
    font-family:'Poppins', sans-serif;
    transition:0.3s;
}

input:focus, textarea:focus, select:focus{
    border-color:#ff6fa5;
    outline:none;
    box-shadow:0 0 6px rgba(255,111,165,0.4);
}

/* Checkbox & radio */

.options{
    margin-top:8px;
}

.options input{
    width:auto;
    margin-right:6px;
}

/* Submit button */

button{
    margin-top:25px;
    width:100%;
    padding:14px;
    background:#ff6fa5;
    border:none;
    border-radius:30px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:all 0.3s ease;
}

/* Button animation */

button:hover{
    background:#ff4d94;
    transform:translateY(-2px);
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

button:active{
    transform:scale(0.97);
}

textarea{
    resize:vertical;
    min-height:120px;
}

</style>
</head>

<body>

<div class="contact-container">

<div class="form-header">
Contact Me
</div>

<form>

<label for="name">Full Name</label>
<input type="text" id="name" name="name" placeholder="Your name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Your email" required>

<label for="subject">Subject</label>
<input type="text" id="subject" name="subject" placeholder="Message subject">

<label for="topic">Reason for Contact</label>
<select id="topic" name="topic">
<option>General Question</option>
<option>Collaboration</option>
<option>Feedback</option>
<option>Other</option>
</select>

<label>How did you find my site?</label>
<div class="options">
<input type="radio" name="source"> Google  
<input type="radio" name="source"> Social Media  
<input type="radio" name="source"> My GRC 365 Class  
</div>

<label>Topics you're interested in</label>
<div class="options">
<input type="checkbox"> Coding  
<input type="checkbox"> Food  
<input type="checkbox"> Friends and Family  
</div>

<label for="message">Comments / Message</label>
<textarea id="message" name="message" placeholder="Write your message..."></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
